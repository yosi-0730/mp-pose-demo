<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0d0d1a">
  <meta name="description" content="リアルタイム多人数骨格検出 Web デモ — MediaPipe Pose Landmarker">
  <title>Pose Detection Demo</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <h1 class="app-title"><span class="accent">Pose</span> Detection</h1>
      <p class="app-subtitle">リアルタイム多人数骨格検出</p>
    </div>
    <span class="version-badge">v1.3.0</span>
  </header>

  <main class="main">
    <div class="canvas-container">
      <video id="video" playsinline muted></video>
      <canvas id="canvas"></canvas>
      <div id="overlay" class="overlay">
        <div class="spinner"></div>
        <p id="status-text" class="overlay-text">初期化中…</p>
      </div>
    </div>
  </main>

  <!-- 設定パネル (controls の直上にスライドアップ) -->
  <div id="settings-panel" class="settings-panel" role="region" aria-label="設定">
    <div class="settings-header">
      <span class="settings-title">設定</span>
      <span class="settings-note-inline">検出設定はカメラ再起動時に反映 &nbsp;|&nbsp; ゴーストフィルタは即時反映</span>
      <button id="btn-settings-reset" class="btn-settings-reset">リセット</button>
    </div>
    <div class="settings-body">

      <label class="setting-row">
        <span class="setting-name">最大検出人数 <span class="setting-hint">少→高速</span></span>
        <input id="s-num-poses" type="range" min="1" max="5" step="1" value="5">
        <span id="v-s-num-poses" class="setting-val">5 人</span>
      </label>

      <label class="setting-row">
        <span class="setting-name">検出信頼度</span>
        <input id="s-detection" type="range" min="0.3" max="0.9" step="0.05" value="0.5">
        <span id="v-s-detection" class="setting-val">50 %</span>
      </label>

      <label class="setting-row">
        <span class="setting-name">追跡信頼度</span>
        <input id="s-tracking" type="range" min="0.3" max="0.9" step="0.05" value="0.5">
        <span id="v-s-tracking" class="setting-val">50 %</span>
      </label>

      <label class="setting-row">
        <span class="setting-name">ゴーストフィルタ</span>
        <input id="s-ghost" type="range" min="0" max="20" step="1" value="12">
        <span id="v-s-ghost" class="setting-val">12 点</span>
      </label>

    </div>
  </div>

  <div class="controls">
    <button id="btn-toggle" class="btn-toggle" disabled>
      <span id="btn-icon" class="btn-icon-sym">&#9654;</span>
      <span id="btn-label">カメラ起動</span>
    </button>
    <button id="btn-camera-switch" class="btn-switch" hidden title="カメラ切替（インカメ/外カメ）">
      <span class="switch-icon">&#x21C4;</span>
      <span class="switch-label">切替</span>
    </button>
    <div class="stats-row">
      <div class="stat-card">
        <span class="stat-label">検出人数</span>
        <span id="people-count" class="stat-value">—</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">FPS</span>
        <span id="fps-value" class="stat-value">—</span>
      </div>
    </div>
    <button id="btn-settings" class="btn-settings-toggle" aria-expanded="false" title="設定">
      <span class="settings-icon">&#9881;</span>
      <span class="settings-toggle-label">設定</span>
    </button>
  </div>

  <footer class="footer">
    Powered by <a href="https://mediapipe.dev" target="_blank" rel="noopener noreferrer">MediaPipe</a>
    &nbsp;&middot;&nbsp; Hosted on GitHub Pages
  </footer>

  <script type="module" src="app.js"></script>
</body>
</html>
